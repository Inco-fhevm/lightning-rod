name: Tests
on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      sdk_version:
        description: "Version of @inco SDK packages to test against (e.g. 0.9.0)"
        required: true
        type: string

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: oven-sh/setup-bun@v2

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Override SDK version in package.json and .env
        if: github.event_name == 'workflow_dispatch'
        run: |
          jq \
            --arg v "${{ inputs.sdk_version }}" \
            '.overrides["@inco/js"] = $v | .overrides["@inco/lightning"] = $v | .overrides["@inco/lightning-preview"] = $v' \
            package.json > package.json.tmp
          mv package.json.tmp package.json
          echo "SDK overrides updated to ${{ inputs.sdk_version }}"

          sed -i "s/^DOCKER_IMAGE_TAG=.*/DOCKER_IMAGE_TAG=v${{ inputs.sdk_version }}/" .env
          echo "DOCKER_IMAGE_TAG updated to v${{ inputs.sdk_version }}"

      - run: bun install
      - run: bun run test
