name: Tests
on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      sdk_version:
        description: "Version of @inco SDK packages to test against (e.g. 1.0.0-rc-8)"
        required: true
        type: string
      pepper:
        description: "Local-node network/pepper to test against"
        type: choice
        default: mainnet
        options:
          - mainnet
          - testnet
          - devnet

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: oven-sh/setup-bun@v2

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Override SDK version and pepper in package.json and .env
        if: github.event_name == 'workflow_dispatch'
        env:
          SDK_VERSION: ${{ inputs.sdk_version }}
          PEPPER: ${{ inputs.pepper }}
        run: |
          jq --arg v "$SDK_VERSION" \
            '.overrides["@inco/lightning-js"] = $v
              | .overrides["@inco/lightning"] = $v' \
            package.json > package.json.tmp
          mv package.json.tmp package.json

          sed -i "s/^DOCKER_IMAGE_TAG=.*/DOCKER_IMAGE_TAG=v$SDK_VERSION/" .env
          sed -i "s/^PEPPER=.*/PEPPER=$PEPPER/" .env
          echo "Using SDK version $SDK_VERSION with pepper $PEPPER"

      - run: bun install
      - run: bun run test
